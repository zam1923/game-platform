name: Build Android APK

on:
  push:
    branches:
      - main
      - 'claude/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        working-directory: apps/client
        run: npm install

      - name: Build Vite app
        working-directory: apps/client
        run: npm run build
        env:
          VITE_SERVER_URL: https://server-production-fef4.up.railway.app

      - name: Add Android platform
        working-directory: apps/client
        run: npx cap add android

      - name: Add deep link intent filter to AndroidManifest
        working-directory: apps/client/android/app/src/main
        run: |
          sed -i 's|</activity>|        <intent-filter>\n                <action android:name="android.intent.action.VIEW" />\n                <category android:name="android.intent.category.DEFAULT" />\n                <category android:name="android.intent.category.BROWSABLE" />\n                <data android:scheme="com.gameplatform.app" android:host="auth" />\n            </intent-filter>\n        </activity>|' AndroidManifest.xml

      - name: Sync Capacitor
        working-directory: apps/client
        run: npx cap sync android

      - name: Build debug APK
        working-directory: apps/client/android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: apps/client/android/app/build/outputs/apk/debug/app-debug.apk
