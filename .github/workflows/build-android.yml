name: Build Android APK

on:
  push:
    branches:
      - main
      - 'claude/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup debug keystore (generate once and commit)
        run: |
          mkdir -p ~/.android
          if [ -f android/debug.keystore ]; then
            echo "Using committed keystore"
            cp android/debug.keystore ~/.android/debug.keystore
          else
            echo "Generating new keystore"
            keytool -genkeypair -v \
              -keystore ~/.android/debug.keystore \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -storepass android \
              -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
            mkdir -p android
            cp ~/.android/debug.keystore android/debug.keystore
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add android/debug.keystore
            git commit -m "ci: debug keystoreを追加（APK署名を固定）"
            git push
          fi

      - name: Install dependencies
        working-directory: apps/client
        run: npm install

      - name: Build Vite app
        working-directory: apps/client
        run: npm run build
        env:
          VITE_SERVER_URL: https://server-production-fef4.up.railway.app
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Add Android platform
        working-directory: apps/client
        run: npx cap add android

      - name: Add deep link intent filter to AndroidManifest
        working-directory: apps/client/android/app/src/main
        run: |
          sed -i 's|</activity>|        <intent-filter>\n                <action android:name="android.intent.action.VIEW" />\n                <category android:name="android.intent.category.DEFAULT" />\n                <category android:name="android.intent.category.BROWSABLE" />\n                <data android:scheme="com.gameplatform.app" android:host="auth" />\n            </intent-filter>\n        </activity>|' AndroidManifest.xml

      - name: Sync Capacitor
        working-directory: apps/client
        run: npx cap sync android

      - name: Build debug APK
        working-directory: apps/client/android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: apps/client/android/app/build/outputs/apk/debug/app-debug.apk
